version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: parsa
      POSTGRES_PASSWORD: parsa123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pgnet

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_panel
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pgnet

  redis:
    image: redis:latest
    container_name: redis-django
    restart: unless-stopped
    ports:
      - "6378:6379"
    volumes:
      - redis-data:/data
    networks:
      - pgnet

volumes:
  postgres_data:
  redis-data:

networks:
  pgnet:
